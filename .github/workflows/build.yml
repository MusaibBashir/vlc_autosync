name: Build VLC AutoSync Plugin (Windows)

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch kiss_fft missing header
        run: |
          echo "Patching _kiss_fft_guts.h to remove missing log header..."
          sed -i 's/#include "kiss_fft_log.h"/\/\/ removed missing header/' kiss_fft/_kiss_fft_guts.h

      - name: Install MinGW Cross-Compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64 unzip wget

      - name: Download Windows VLC 3.0.20 SDK
        run: |
          echo "Downloading official Windows VLC binaries..."
          wget -q https://get.videolan.org/vlc/3.0.20/win64/vlc-3.0.20-win64.zip
          unzip -q vlc-3.0.20-win64.zip
          echo "VLC SDK Extracted."

      - name: Compile Windows DLL
        # Bypassing CMake entirely for a direct, clean cross-compilation
        run: |
          x86_64-w64-mingw32-gcc -shared -o libautosync_plugin.dll \
            autosync.c autosync_fft.c kiss_fft/kiss_fft.c \
            -I./kiss_fft \
            -Ivlc-3.0.20/sdk/include \
            -Ivlc-3.0.20/sdk/include/vlc/plugins \
            -Lvlc-3.0.20/sdk/lib \
            -lvlccore -lvlc -lm \
            -O3 -ffast-math -funroll-loops \
            -D__PLUGIN__ -DMODULE_STRING=\"autosync\"
            
      - name: Verify Output
        run: |
          ls -lh libautosync_plugin.dll
          file libautosync_plugin.dll

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libautosync_plugin-windows-${{ github.sha }}
          path: libautosync_plugin.dll
          retention-days: 30