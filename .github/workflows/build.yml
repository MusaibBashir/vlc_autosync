name: Build VLC AutoSync Plugin

on:
  push:
    branches: [main]
    tags:     ["v*"]          # triggers the release step
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest   # VLC dev headers are easiest on Ubuntu

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls kiss_fft if it's a submodule

      # ── 2. Cache kiss_fft build ────────────────────────────────────────
      - name: Cache kiss_fft
        uses: actions/cache@v4
        with:
          path: kiss_fft
          key: kissfft-${{ hashFiles('kiss_fft/**') }}

      # ── 3. Install system dependencies ────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            pkg-config \
            libvlc-dev \
            libvlccore-dev \
            vlc-plugin-base

      # ── 4. CMake configure ─────────────────────────────────────────────
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVLC_PLUGIN_DIR=${{ github.workspace }}/dist

      # ── 5. Build ───────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 6. Verify the .so was produced ────────────────────────────────
      - name: Verify output
        run: |
          ls -lh build/libautosync_plugin.so
          file build/libautosync_plugin.so

      # ── 7. Upload artifact (every build) ──────────────────────────────
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: libautosync_plugin-${{ github.sha }}
          path: build/libautosync_plugin.so
          retention-days: 30

      # ── 8. Create GitHub release (tag pushes only) ────────────────────
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libautosync_plugin.so
          generate_release_notes: true