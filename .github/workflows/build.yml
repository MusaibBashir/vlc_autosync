name: Build VLC AutoSync Plugin

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache kiss_fft
        uses: actions/cache@v4
        with:
          path: kiss_fft
          key: kissfft-${{ hashFiles('kiss_fft/**') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            pkg-config \
            libvlc-dev \
            libvlccore-dev \
            vlc-plugin-base

      # Confirm the headers and .pc file are present before cmake runs
      - name: Verify VLC dev packages
        run: |
          pkg-config --modversion libvlc
          find /usr/include -name "vlc_common.h" | head -3
          find /usr/lib -name "libvlccore.so*"   | head -3

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVLC_PLUGIN_DIR=${{ github.workspace }}/dist

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify output
        run: |
          ls -lh build/libautosync_plugin.so
          file build/libautosync_plugin.so

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: libautosync_plugin-${{ github.sha }}
          path: build/libautosync_plugin.so
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libautosync_plugin.so
          generate_release_notes: true