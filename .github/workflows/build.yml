name: Build VLC AutoSync Plugin (Windows)

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch kiss_fft missing header
        run: |
          echo "Patching _kiss_fft_guts.h to replace missing log header..."
          # Replaces the missing include with a fallback macro so it compiles
          sed -i 's/#include "kiss_fft_log.h"/#define KISS_FFT_ERROR(msg) exit(1)/' kiss_fft/_kiss_fft_guts.h

      - name: Install MinGW Cross-Compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64 unzip wget xz-utils

      - name: Download VLC Source & Windows SDK
        run: |
          echo "Downloading Windows SDK for linking libraries..."
          wget -q https://get.videolan.org/vlc/3.0.20/win64/vlc-3.0.20-win64.zip
          unzip -q vlc-3.0.20-win64.zip
          
          echo "Downloading VLC Source for plugin headers..."
          wget -q https://get.videolan.org/vlc/3.0.20/vlc-3.0.20.tar.xz
          tar -xf vlc-3.0.20.tar.xz

      - name: Compile Windows DLL
        run: |
          x86_64-w64-mingw32-gcc -shared -o libautosync_plugin.dll \
            -include winsock2.h \
            autosync.c autosync_fft.c kiss_fft/kiss_fft.c \
            -I./kiss_fft \
            -Ivlc-3.0.20/include \
            -O3 -ffast-math -funroll-loops \
            -D__PLUGIN__ -DMODULE_STRING=\"autosync\" \
            -D_WIN32_WINNT=0x0601 \
            vlc-3.0.20/libvlccore.dll \
            vlc-3.0.20/libvlc.dll \
            -lm -lws2_32
            
      - name: Verify Output
        run: |
          ls -lh libautosync_plugin.dll
          file libautosync_plugin.dll

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libautosync_plugin-windows-${{ github.sha }}
          path: libautosync_plugin.dll
          retention-days: 30